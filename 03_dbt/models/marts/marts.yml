version: 2

models:
  - name: mart_heat_hotwater
    description: "Monthly heat & hot water complaint volume by borough and season from 2020 to present. Used for Analysis 1: Heat & Hot Water Failure Patterns."
    columns:
      - name: borough
        description: "NYC borough."
        tests:
          - not_null
          - accepted_values:
              values: ['MANHATTAN', 'BROOKLYN', 'QUEENS', 'BRONX', 'STATEN ISLAND']
      - name: year
        description: "Year of the complaint."
        tests:
          - not_null
      - name: month
        description: "Month of the complaint."
        tests:
          - not_null
      - name: season
        description: "Whether the month falls within NYC heat season (Oct-May) or not."
        tests:
          - not_null
          - accepted_values:
              values: ['heat season', 'non-heat season']
      - name: total_complaints
        description: "Total heat/hot water complaints for this borough/month."
        tests:
          - not_null

  - name: mart_housing_response_times
    description: "Average resolution times for housing maintenance complaints by borough, complaint type, and year. Used for Analysis 2: Housing Maintenance Response Times."
    columns:
      - name: borough
        description: "NYC borough."
        tests:
          - not_null
          - accepted_values:
              values: ['MANHATTAN', 'BROOKLYN', 'QUEENS', 'BRONX', 'STATEN ISLAND']
      - name: complaint_type
        description: "Housing maintenance complaint category."
        tests:
          - not_null
      - name: year
        description: "Year of the complaints."
        tests:
          - not_null
      - name: total_complaints
        description: "Total complaints for this borough/complaint_type/year."
        tests:
          - not_null
      - name: avg_resolution_days
        description: "Average days to resolve — null if no resolved complaints in this group."
      - name: pct_resolved
        description: "Percentage of complaints resolved."

  - name: mart_complaints_geo
    description: "Individual housing maintenance complaint records with valid NYC coordinates for geographic heatmap. Filtered to housing complaint types and NYC bounding box."
    columns:
      - name: unique_key
        description: "Unique identifier for the service request."
        tests:
          - not_null
          - unique
      - name: latitude
        description: "Latitude — non-null and within NYC bounds."
        tests:
          - not_null
      - name: longitude
        description: "Longitude — non-null and within NYC bounds."
        tests:
          - not_null
      - name: borough
        description: "NYC borough."
        tests:
          - not_null
      - name: complaint_category
        description: "Housing maintenance complaint category."
        tests:
          - not_null
