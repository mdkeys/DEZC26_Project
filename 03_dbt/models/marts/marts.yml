version: 2

models:
  - name: mart_complaints_by_borough
    description: "Aggregated 311 complaint volume and resolution metrics by borough, month, and complaint type. Partitioned by year, clustered by borough and complaint_type."
    columns:
      - name: borough
        description: "NYC borough name."
        tests:
          - not_null
          - accepted_values:
              values: ['MANHATTAN', 'BROOKLYN', 'QUEENS', 'BRONX', 'STATEN ISLAND']
      - name: year
        description: "Year of the complaint."
        tests:
          - not_null
      - name: month
        description: "Month of the complaint."
        tests:
          - not_null
      - name: complaint_type
        description: "Primary complaint category."
        tests:
          - not_null
      - name: total_complaints
        description: "Total number of complaints for this borough/month/complaint_type combination."
        tests:
          - not_null
      - name: pct_resolved
        description: "Percentage of complaints resolved."
      - name: avg_resolution_days
        description: "Average number of days to resolve a complaint."

  - name: mart_complaint_types
    description: "Aggregated complaint volume and resolution metrics by complaint type, descriptor, and borough. Useful for identifying the most common and slowest-to-resolve complaint categories."
    columns:
      - name: complaint_type
        description: "Primary complaint category."
        tests:
          - not_null
      - name: total_complaints
        description: "Total number of complaints for this combination."
        tests:
          - not_null
      - name: avg_resolution_days
        description: "Average days to resolve — null if no resolved complaints in this group."
      - name: pct_resolved
        description: "Percentage of complaints in this group that have been resolved."

  - name: mart_agency_performance
    description: "Agency-level performance metrics including complaint volume, resolution rate, and average resolution time. Partitioned by year, clustered by agency and complaint_type."
    columns:
      - name: agency
        description: "City agency code."
        tests:
          - not_null
      - name: total_complaints
        description: "Total complaints handled by this agency."
        tests:
          - not_null
      - name: pct_resolved
        description: "Percentage of complaints resolved by this agency."
      - name: avg_resolution_days
        description: "Average days to resolve a complaint for this agency."
      - name: pct_resolved_within_30_days
        description: "Percentage of resolved complaints closed within 30 days."

  - name: mart_complaints_geo
    description: "Individual complaint records with valid coordinates for geographic mapping. Filtered to NYC bounding box. Partitioned by year, clustered by borough and complaint_type."
    columns:
      - name: unique_key
        description: "Unique identifier for the service request."
        tests:
          - not_null
          - unique
      - name: latitude
        description: "Latitude coordinate — guaranteed non-null and within NYC bounds."
        tests:
          - not_null
      - name: longitude
        description: "Longitude coordinate — guaranteed non-null and within NYC bounds."
        tests:
          - not_null
      - name: borough
        description: "NYC borough."
        tests:
          - not_null
      - name: complaint_type
        description: "Primary complaint category."
        tests:
          - not_null
