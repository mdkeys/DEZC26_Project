id: nyc_311_ingestion_v2
namespace: nyc_311

description: |
  **Use this version if you are setting up Kestra to use the API from dbt Cloud 
  to auto-trigger `dbt build` after Kestra completes monthly execution. Note that this
  has not been verified by me to work because the dbt Cloud plan I am working with
  does not include API use.**
  
  Extracts NYC 311 service request data from the Socrata API month by month,
  converts to Parquet, uploads to GCS, and creates/refreshes the BigQuery
  external table pointing at the GCS data. 

  Run modes:
  - Backfill: triggered manually with no inputs (processes 2020-01 to last completed month)
  - Single month: triggered manually with year + month inputs (for testing or reruns)

inputs:
  - id: year
    type: INT
    required: false
    description: "Year to process (e.g. 2022). Leave blank for full backfill."

  - id: month
    type: INT
    required: false
    description: "Month to process (e.g. 6). Leave blank for full backfill."

tasks:

  # ------------------------------------------------------------------
  # Task 1: Extract from Socrata API and upload Parquet files to GCS
  # ------------------------------------------------------------------
  - id: extract_and_upload
    type: io.kestra.plugin.scripts.python.Commands
    namespaceFiles:
      enabled: true
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install --no-cache-dir requests pandas pyarrow python-dotenv google-cloud-storage python-dateutil --quiet
    commands:
      - |
        if [ -n "{{ inputs.year }}" ] && [ -n "{{ inputs.month }}" ]; then
          echo "Running single month: {{ inputs.year }}-{{ inputs.month }}"
          python extract_311.py --year {{ inputs.year }} --month {{ inputs.month }}
        else
          echo "Running full backfill from 2020-01 to last completed month"
          python extract_311.py
        fi
    env:
      SOCRATA_APP_TOKEN: "{{ secret('SOCRATA_APP_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ secret('GCS_BUCKET_NAME') }}"
      GCS_PREFIX: "nyc_311"
      GCP_SERVICE_ACCOUNT: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

  # ------------------------------------------------------------------
  # Task 2: Create or replace BigQuery external table over GCS Parquet
  # ------------------------------------------------------------------
  - id: create_external_table
    type: io.kestra.plugin.gcp.bigquery.Query
    serviceAccount: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
    projectId: "{{ secret('GCP_PROJECT_ID') }}"
    sql: |
      CREATE OR REPLACE EXTERNAL TABLE `{{ secret('GCP_PROJECT_ID') }}.nyc_311_raw.external_311_requests`
      WITH PARTITION COLUMNS (
        year  INT64,
        month INT64
      )
      OPTIONS (
        format              = 'PARQUET',
        uris = ['gs://{{ secret("GCS_BUCKET_NAME") }}/nyc_311/*'],
        hive_partition_uri_prefix = 'gs://{{ secret("GCS_BUCKET_NAME") }}/nyc_311',
        require_hive_partition_filter = false
      );

# ------------------------------------------------------------------
  # Task 3: Trigger dbt Cloud job to refresh mart tables
  # Waits for the job to complete before marking this task as done
  # ------------------------------------------------------------------
  - id: trigger_dbt_job
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: python:3.11-slim
    beforeCommands:
      - pip install --no-cache-dir requests --quiet
    commands:
      - |
        python << 'EOF'
        import requests
        import time
        import sys

        API_TOKEN  = "{{ secret('DBT_API_TOKEN') }}"
        ACCOUNT_ID = "{{ secret('DBT_ACCOUNT_ID') }}"
        JOB_ID     = "{{ secret('DBT_JOB_ID') }}"

        headers = {
            "Authorization": f"Token {API_TOKEN}",
            "Content-Type": "application/json"
        }

        # Trigger the job
        trigger_url = f"https://cloud.getdbt.com/api/v2/accounts/{ACCOUNT_ID}/jobs/{JOB_ID}/run/"
        payload = {"cause": "Triggered by Kestra after ingestion"}

        print(f"Triggering dbt Cloud job {JOB_ID} on account {ACCOUNT_ID}...")
        response = requests.post(trigger_url, headers=headers, json=payload)
        response.raise_for_status()

        run_id = response.json()["data"]["id"]
        print(f"dbt job triggered. Run ID: {run_id}")

        # Poll until complete
        status_url = f"https://cloud.getdbt.com/api/v2/accounts/{ACCOUNT_ID}/runs/{run_id}/"
        while True:
            time.sleep(30)
            status_response = requests.get(status_url, headers=headers)
            status_response.raise_for_status()
            run_data = status_response.json()["data"]
            status = run_data["status"]
            status_message = run_data.get("status_humanized", status)
            print(f"dbt run status: {status_message}")

            if status == 10:  # Success
                print("dbt job completed successfully.")
                break
            elif status in (20, 30):  # Error or Cancelled
                print(f"dbt job failed with status: {status_message}")
                sys.exit(1)
        EOF
        
  # ------------------------------------------------------------------
  # Task 4: Log completion
  # ------------------------------------------------------------------
  - id: log_success
    type: io.kestra.plugin.core.log.Log
    message: |
      Pipeline complete.
      Year input:  {{ inputs.year ?? 'backfill' }}
      Month input: {{ inputs.month ?? 'backfill' }}
      External table: nyc_311_raw.external_311_requests
      dbt marts refreshed: nyc_311_prod

# ------------------------------------------------------------------
# Schedule: run on the 2nd of each month at 6am UTC
# Pulls the previous month's complete data
# ------------------------------------------------------------------
triggers:
  - id: monthly_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 2 * *"
    disabled: false   # enable this (change to 'false') once backfill is complete